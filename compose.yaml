# Data lives OUTSIDE the repo. Inside the container the app always uses
# /opt/insta_news_data (same as Ubuntu / Kubernetes).
#
# On Mac, Docker Desktop cannot mount /opt unless you add it under
# Settings → Resources → File Sharing. Easier: put data under your home folder
# on the host and set INSTA_NEWS_DATA_ROOT in .env (see .env_example).

services:
  server:
    build:
      context: .
    env_file: [.env]
    ports:
      - 8000:8000
    volumes:
      - ${INSTA_NEWS_DATA_ROOT:-/opt/insta_news_data}:${INSTA_NEWS_DATA_MOUNT:-/opt/insta_news_data}
